server.port=${PORT:${SERVER_PORT:8081}}

# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/thriftbazaar}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# HIBERNATE PERFORMANCE
# ==========================================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ==========================================
# CLOUDINARY
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ==========================================
# FILE UPLOAD
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ==========================================
# RAZORPAY
# ==========================================
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# ==========================================
# HIKARICP - Keep DB alive (Supabase free tier)
# ==========================================
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5

# ==========================================
# KEEP-ALIVE SCHEDULER
# ==========================================
app.backend-url=${BACKEND_URL:http://localhost:8081}

# ==========================================
# LOGGING
# ==========================================
logging.level.com.thriftbazaar=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
